name: gerenciador_senhas
description: "A secure password manager app built with Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  encrypt: ^5.0.3
  provider: ^6.1.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  path: ^1.9.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  share_plus: ^12.0.1        
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/icon/icon.png"